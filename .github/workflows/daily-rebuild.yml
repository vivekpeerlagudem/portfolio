name: Daily Rebuild
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Trigger rebuild
        run: |
          git config user.email "peerlagudemvivek@gmail.com"
          git config user.name "Vivek Peerlagudem"
          git commit --allow-empty -m "chore: daily rebuild"
          git push
